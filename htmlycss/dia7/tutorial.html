<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial de 5 pasos para abrir YouTube</title>
</head>
<body>
    <h1>Tutorial de 5 pasos</h1>

    <ol>
        <li>Crear un archivo llamado <strong>index.html</strong>.</li>
        <li>Escribir la estructura básica de HTML.</li>
        <li>Agregar un botón que abra YouTube.</li>
        <li>Guardar el archivo.</li>
        <li>Abrir el archivo en el navegador y hacer clic en el botón.</li>
    </ol>

    <button onclick="window.open('https://www.youtube.com', '_blank')">
        Abrir YouTube
    </button>
</body>
</html>
